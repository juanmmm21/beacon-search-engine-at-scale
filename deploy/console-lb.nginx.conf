# Balanceador de desarrollo para las réplicas de la API de la consola
# (fase 6). nginx resuelve 'console-api' contra el DNS embebido de Docker
# (127.0.0.11), que devuelve las IPs de TODAS las réplicas del servicio y las
# rota en round-robin -- así 'docker compose up -d --scale console-api=N'
# añade réplicas al balanceo sin tocar esta configuración.
#
# 'resolver ... valid=5s' + variable en proxy_pass: fuerza a nginx a
# re-resolver el nombre en caliente en vez de fijar las IPs una única vez al
# arrancar -- sin esto, una réplica reiniciada (IP nueva) dejaría a nginx
# apuntando a una IP muerta hasta reiniciar también el balanceador.

server {
    listen 8080;

    resolver 127.0.0.11 valid=5s ipv6=off;
    set $console_upstream http://console-api:8000;

    location / {
        proxy_pass $console_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
